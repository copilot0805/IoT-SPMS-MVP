<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>IoT-SPMS - System Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-800 flex justify-center items-center min-h-screen py-10 overflow-auto">
    
    <div id="simulator-container" class="relative w-[390px] h-[844px] bg-black rounded-[50px] border-[8px] border-gray-900 shadow-2xl overflow-hidden transition-all duration-700 ease-in-out">
        
        <iframe 
            id="app-frame"
            style="border: none; border-radius: inherit;" 
            width="100%" 
            height="100%" 
            src="views/common/uc01_login_mobile.html" 
            allowfullscreen>
        </iframe>

    </div>

    <script>
        // Lắng nghe tín hiệu từ file Login gửi ra
        window.addEventListener("message", function(event) {
            const container = document.getElementById("simulator-container");
            
            if (event.data === "switch-to-macbook") {
                // Tháo vỏ iPhone, lắp vỏ Macbook (Màn hình ngang 1280x800)
                container.classList.remove("w-[390px]", "h-[844px]", "rounded-[50px]", "border-[8px]");
                container.classList.add("w-[1280px]", "h-[800px]", "rounded-[24px]", "border-[12px]");
            } 
            else if (event.data === "switch-to-mobile") {
                // Thu nhỏ lại thành iPhone khi đăng xuất
                container.classList.remove("w-[1280px]", "h-[800px]", "rounded-[24px]", "border-[12px]");
                container.classList.add("w-[390px]", "h-[844px]", "rounded-[50px]", "border-[8px]");
            }
        });
    </script>

</body>
</html>
