<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .screen { position: absolute; inset: 0; display: none; opacity: 0; transition: opacity 0.3s ease; }
        .active { display: block; opacity: 1; }
        .content-area { width: 390px; height: 844px; margin: auto; position: relative; background: #fff; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        
        /* CÁCH CHỈNH NÚT BẤM (HOTSPOT) */
        .hotspot { 
            position: absolute; 
            cursor: pointer; 
            z-index: 50; 
            /* MÀU ĐỎ ĐỂ CĂN CHỈNH: Khi nào căn khít xong, bạn xóa dòng background này đi là nó tàng hình */
            /* background: rgba(255, 0, 0, 0.4);  */
            /* border: 2px dashed yellow; */
        }
    </style>
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen">

    <div class="content-area" id="app">

        <!-- =================== MÀN HÌNH MENU CHỌN FLOW =================== -->
        <div id="menu" class="screen active p-6 flex flex-col justify-center gap-4">
            <h1 class="text-white text-center font-bold">MENU TEST FLOW</h1>
            <button onclick="show('f1_check')" class="p-4 bg-green-600 text-white rounded">Flow 1: Free</button>
            <button onclick="show('f2_check')" class="p-4 bg-red-600 text-white rounded">Flow 2: Error</button>
            <button onclick="show('f3_check')" class="p-4 bg-blue-600 text-white rounded">Flow 3: Dept</button>
            <button onclick="show('f4_check')" class="p-4 bg-orange-600 text-white rounded">Flow 4: Visitor</button>
        </div>

        <!-- =================== FLOW 1: FREE =================== -->
        <div id="f1_check" class="screen"><img src="../../assets/images/uc07_check_fee_fl1.png" class="w-full h-full object-cover">
            <!-- ĐÂY LÀ CHỖ CHỈNH VỊ TRÍ NÚT: Thay đổi Top, Left, Width, Height -->
            <div onclick="autoLoad('f1_load', 'f1_free')" class="hotspot" style="top: 51%; left: 8%; width: 85%; height: 6.5%;"></div>
        </div>
        
        <div id="f1_load" class="screen"><img src="../../assets/images/uc07_loading_fee_fl1.png" class="w-full h-full object-cover"></div>
        
        <div id="f1_free" class="screen"><img src="../../assets/images/uc07_free_fl1.png" class="w-full h-full object-cover">
            <!-- Nút ra màn hình chính -->
            <div onclick="goToDashboard()" class="hotspot" style="top: 1%; left: 1%; width: 12%; height: 6%;"></div>
        </div>


        <!-- =================== FLOW 2: ERROR =================== -->
        <div id="f2_check" class="screen"><img src="../../assets/images/uc07_check_fee_fl1.png" class="w-full h-full object-cover">
            <!-- Nút Check Fee -->
            <div onclick="autoLoad('f2_load', 'f2_fail')" class="hotspot" style="top: 51%; left: 8%; width: 85%; height: 6.5%;"></div>
        </div>
        
        <div id="f2_load" class="screen"><img src="../../assets/images/uc07_loading_fee_fl1.png" class="w-full h-full object-cover"></div>
        
        <div id="f2_fail" class="screen"><img src="../../assets/images/uc07_fail_fee_fl2.png" class="w-full h-full object-cover">
            <!-- Nút quay lại màn check -->
            <div onclick="show('f2_check')" class="hotspot" style="top: 65%; left: 8%; width: 85%; height: 6.5%;"></div>
            <div onclick="goToDashboard()" class="hotspot" style="top: 7%; left: 5%; width: 12%; height: 6%;"></div>
        </div>


        <!-- =================== FLOW 3: DEPT =================== -->
        <div id="f3_check" class="screen"><img src="../../assets/images/uc07_check_fee_fl1.png" class="w-full h-full object-cover">
            <!-- Nút Check Fee -->
            <div onclick="autoLoad('f3_load', 'f3_dept')" class="hotspot" style="top: 51%; left: 8%; width: 85%; height: 6.5%;"></div>
        </div>
        
        <div id="f3_load" class="screen"><img src="../../assets/images/uc07_loading_fee_fl1.png" class="w-full h-full object-cover"></div>
        
        <div id="f3_dept" class="screen"><img src="../../assets/images/uc07_loading_dept_fl3.png" class="w-full h-full object-cover">
            <!-- Nút xác nhận nợ -->
            <div onclick="autoLoad('f3_connect', 'f3_success')" class="hotspot" style="top: 70%; left: 8%; width: 85%; height: 6.5%;"></div>
        </div>

        <div id="f3_connect" class="screen"><img src="../../assets/images/uc07_connect_bkpay_fl3.png" class="w-full h-full object-cover"></div>

        <div id="f3_success" class="screen"><img src="../../assets/images/uc07_successful_fl3.png" class="w-full h-full object-cover">
            <!-- Nút ra màn hình chính -->
            <div onclick="goToDashboard()" class="hotspot" style="top: 81%; left: 5%; width: 91%; height: 6.5%;"></div>
        </div>


        <!-- =================== FLOW 4: VISITOR =================== -->
        <div id="f4_check" class="screen"><img src="../../assets/images/uc07_check_fee_fl1.png" class="w-full h-full object-cover">
            <!-- Nút Check Fee -->
            <div onclick="autoLoad('f4_load', 'f4_bkpay')" class="hotspot" style="top: 51%; left: 8%; width: 85%; height: 6.5%;"></div>
        </div>
        
        <div id="f4_load" class="screen"><img src="../../assets/images/uc07_loading_fee_fl1.png" class="w-full h-full object-cover"></div>
        
        <div id="f4_bkpay" class="screen"><img src="../../assets/images/uc07_bkpay_fl4.png" class="w-full h-full object-cover">
            <!-- Nút B: Thanh toán thất bại -->
            <div onclick="show('f4_fail')" class="hotspot" style="top: 74.5%; left: 12.5%; width: 35%; height: 5.5%;"></div>
            <!-- Nút A: Thanh toán thành công -->
            <div onclick="show('f4_success')" class="hotspot" style="top: 74.5%; left: 51.5%; width: 35%; height: 5.5%;"></div>
        </div>

        <div id="f4_success" class="screen"><img src="../../assets/images/uc07_successful_fl4.png" class="w-full h-full object-cover">
            <!-- Nút ra màn hình chính -->
            <div onclick="goToDashboard()" class="hotspot" style="top: 81%; left: 5%; width: 91%; height: 6.5%;"></div>
        </div>

        <div id="f4_fail" class="screen"><img src="../../assets/images/uc07_fail_fl4.png" class="w-full h-full object-cover">
            <!-- Nút thử lại (về bkpay) -->
            <div onclick="show('f4_bkpay')" class="hotspot" style="top: 67%; left: 5%; width: 90%; height: 6.5%;"></div>
            <div onclick="goToDashboard()" class="hotspot" style="top: 4%; left: 1%; width: 12%; height: 6%;"></div>
        </div>

    </div>

    <!-- =================== LOGIC JAVASCRIPT =================== -->
    <script>
        // Hàm chuyển màn hình cơ bản
        function show(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // Hàm xử lý Màn hình Loading (Tự động chuyển sau 1s)
        // loadId: ID màn hình đang loading, nextId: ID màn hình sau khi load xong
        function autoLoad(loadId, nextId) {
            show(loadId);
            setTimeout(() => {
                show(nextId);
            }, 1000); // 1000 = 1 giây
        }

        // Hàm về màn hình chính
        function goToDashboard() {
            // Tạm thời cho về màn Menu test. 
            // Khi nộp bài, bạn thay dòng này thành: window.location.href = '../learner/dashboard.html';
            show('menu'); 
        }
    </script>
</body>
</html>
