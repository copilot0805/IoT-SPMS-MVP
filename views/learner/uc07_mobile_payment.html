<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .screen { position: absolute; inset: 0; display: none; opacity: 0; transition: opacity 0.3s ease; }
        .active { display: block; opacity: 1; }
        
        .content-area { 
            width: 390px; height: 844px; margin: auto; position: relative; overflow: hidden; 
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            /* Thêm ảnh nền vào đây */
            background-image: url('../../assets/images/uc7_loading_time_1.png');
            background-size: cover;
            background-position: center;
        }
        
        .hotspot { position: absolute; cursor: pointer; z-index: 50; }
        /* Lớp phủ tàng hình cho menu */
        .invisible-btn { opacity: 0; cursor: pointer; width: 100%; height: 60px; }
    </style>
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen">

    <div class="content-area" id="app">
        <div id="custom-confirm" class="hidden absolute inset-0 z-[60] flex items-center justify-center bg-black/60 fade-in">
            <div class="bg-white w-10/12 rounded-2xl p-5 shadow-2xl flex flex-col relative text-center">
                <h3 class="font-bold text-lg text-blue-600 mb-2">Số dư không đủ</h3>
                <p id="custom-confirm-msg" class="text-sm text-gray-700 mb-5">Số dư BKPay không đủ. Bạn có muốn dùng tính năng Ghi nợ của ĐHBK không?</p>
                
                <div class="flex gap-3">
                    <button onclick="rejectDebt()" class="w-1/2 bg-gray-300 text-gray-800 font-bold py-3 rounded-xl hover:bg-gray-400 transition">Hủy</button>
                    <button onclick="acceptDebt()" class="w-1/2 bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition">Đồng ý</button>
                </div>
            </div>
        </div>
        <!-- Menu tàng hình nằm trên nền ảnh uc7_loading_time_1 -->
        <!-- <div id="menu" class="screen active p-6 flex flex-col justify-center gap-4">
            <div onclick="show('f1_check')" class="invisible-btn"></div>
            <div onclick="show('f2_check')" class="invisible-btn"></div>
            <div onclick="show('f3_check')" class="invisible-btn"></div>
        </div> -->

        <!-- Các màn hình chức năng -->
        <!-- <div id="f1_check" class="screen"><img src="../../assets/images/uc07_check_fee_fl1.png" class="w-full h-full object-cover">
            <div onclick="autoLoad('f1_load', 'f1_free')" class="hotspot" style="top: 51%; left: 8%; width: 85%; height: 6.5%;"></div>
        </div> -->
        <div id="f1_check" class="screen active">
            <img src="../../assets/images/uc07_check_fee_fl1.png" class="w-full h-full object-cover">
            <div onclick="processPayment()" class="hotspot" style="top: 51%; left: 8%; width: 85%; height: 6.5%;"></div>
        </div>
        <div id="f1_load" class="screen"><img src="../../assets/images/uc07_loading_fee_fl1.png" class="w-full h-full object-cover"></div>
        <div id="f1_free" class="screen"><img src="../../assets/images/uc07_free_fl1.png" class="w-full h-full object-cover">
            <div onclick="goToDashboard(true)" class="hotspot" style="top: 1%; left: 1%; width: 12%; height: 6%;"></div>
        </div>

        <div id="f2_check" class="screen"><img src="../../assets/images/uc07_check_fee_fl1.png" class="w-full h-full object-cover">
            <div onclick="autoLoad('f2_load', 'f2_fail')" class="hotspot" style="top: 51%; left: 8%; width: 85%; height: 6.5%;"></div>
        </div>
        <div id="f2_load" class="screen"><img src="../../assets/images/uc07_loading_fee_fl1.png" class="w-full h-full object-cover"></div>
        <div id="f2_fail" class="screen"><img src="../../assets/images/uc07_fail_fee_fl2.png" class="w-full h-full object-cover">
            <div onclick="show('f2_check')" class="hotspot" style="top: 65%; left: 8%; width: 85%; height: 6.5%;"></div>
            <div onclick="goToDashboard(false)" class="hotspot" style="top: 7%; left: 5%; width: 12%; height: 6%;"></div>
        </div>

        <div id="f3_check" class="screen"><img src="../../assets/images/uc07_check_fee_fl1.png" class="w-full h-full object-cover">
            <div onclick="autoLoad('f3_load', 'f3_dept')" class="hotspot" style="top: 51%; left: 8%; width: 85%; height: 6.5%;"></div>
        </div>
        <div id="f3_load" class="screen"><img src="../../assets/images/uc07_loading_fee_fl1.png" class="w-full h-full object-cover"></div>
        <div id="f3_dept" class="screen"><img src="../../assets/images/uc07_loading_dept_fl3.png" class="w-full h-full object-cover">
            <div onclick="autoLoad('f3_connect', 'f3_success')" class="hotspot" style="top: 70%; left: 8%; width: 85%; height: 6.5%;"></div>
        </div>
        <div id="f3_connect" class="screen"><img src="../../assets/images/uc07_connect_bkpay_fl3.png" class="w-full h-full object-cover"></div>
        <div id="f3_success" class="screen"><img src="../../assets/images/uc07_successful_fl3.png" class="w-full h-full object-cover">
            <div onclick="goToDashboard(true)" class="hotspot" style="top: 81%; left: 5%; width: 91%; height: 6.5%;"></div>
        </div>
    </div>

    <script>
        function show(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function autoLoad(loadId, nextId) {
            show(loadId);
            setTimeout(() => { show(nextId); }, 1500);
        }

        function goToDashboard(isSuccess) {
            if(isSuccess) {
                localStorage.setItem('student_payment', 'success_' + Date.now());
            }
            window.location.href = '../common/uc01_login_mobile.html?return=true&success=' + isSuccess;
        }

        // LUỒNG THANH TOÁN THÔNG MINH (DÙNG POPUP CUSTOM)
        function processPayment() {
            let balance = parseInt(localStorage.getItem('bkpay_balance') || '0');
            let fee = 2000; // Giả sử phí gửi xe là 2.000đ

            if (balance >= fee) {
                // Đủ tiền -> Trừ tiền -> Chạy Flow 1 (Thành công)
                balance -= fee;
                localStorage.setItem('bkpay_balance', balance);
                autoLoad('f1_load', 'f1_free');
            } else {
                // Không đủ tiền -> Bật cái bảng Custom Confirm lên
                document.getElementById('custom-confirm-msg').innerText = "Số dư BKPay không đủ (Còn " + balance.toLocaleString('vi-VN') + "đ). Bạn có muốn dùng tính năng Ghi nợ của ĐHBK không?";
                document.getElementById('custom-confirm').classList.remove('hidden');
            }
        }

        // Nếu bấm "Đồng ý" ghi nợ
        function acceptDebt() {
            document.getElementById('custom-confirm').classList.add('hidden'); // Ẩn popup
            autoLoad('f3_load', 'f3_dept'); // Chạy Flow 3 (Ghi nợ)
        }

        // Nếu bấm "Hủy" ghi nợ
        function rejectDebt() {
            document.getElementById('custom-confirm').classList.add('hidden'); // Ẩn popup
            autoLoad('f2_load', 'f2_fail'); // Chạy Flow 2 (Thất bại)
        }
    </script>
</body>
</html>
