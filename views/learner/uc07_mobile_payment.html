<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .screen { position: absolute; inset: 0; display: none; opacity: 0; transition: opacity 0.3s ease; }
        .active { display: block; opacity: 1; }
        .content-area { width: 390px; height: 844px; margin: auto; position: relative; background: #fff; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .hotspot { position: absolute; cursor: pointer; z-index: 50; }
    </style>
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen">

    <div class="content-area" id="app">
        <div id="menu" class="screen active p-6 flex flex-col justify-center gap-4">
            <h1 class="text-white text-center font-bold text-xl mb-4">THANH TOÁN SINH VIÊN</h1>
            <button onclick="show('f1_check')" class="p-4 bg-green-600 text-white rounded font-bold">1. Miễn phí / Đủ số dư</button>
            <button onclick="show('f2_check')" class="p-4 bg-red-600 text-white rounded font-bold">2. Thanh toán lỗi</button>
            <button onclick="show('f3_check')" class="p-4 bg-blue-600 text-white rounded font-bold">3. Ghi nợ (BKPay)</button>
        </div>

        <div id="f1_check" class="screen"><img src="../../assets/images/uc07_check_fee_fl1.png" class="w-full h-full object-cover">
            <div onclick="autoLoad('f1_load', 'f1_free')" class="hotspot" style="top: 51%; left: 8%; width: 85%; height: 6.5%;"></div>
        </div>
        <div id="f1_load" class="screen"><img src="../../assets/images/uc07_loading_fee_fl1.png" class="w-full h-full object-cover"></div>
        <div id="f1_free" class="screen"><img src="../../assets/images/uc07_free_fl1.png" class="w-full h-full object-cover">
            <div onclick="goToDashboard(true)" class="hotspot" style="top: 1%; left: 1%; width: 12%; height: 6%;"></div>
        </div>

        <div id="f2_check" class="screen"><img src="../../assets/images/uc07_check_fee_fl1.png" class="w-full h-full object-cover">
            <div onclick="autoLoad('f2_load', 'f2_fail')" class="hotspot" style="top: 51%; left: 8%; width: 85%; height: 6.5%;"></div>
        </div>
        <div id="f2_load" class="screen"><img src="../../assets/images/uc07_loading_fee_fl1.png" class="w-full h-full object-cover"></div>
        <div id="f2_fail" class="screen"><img src="../../assets/images/uc07_fail_fee_fl2.png" class="w-full h-full object-cover">
            <div onclick="show('f2_check')" class="hotspot" style="top: 65%; left: 8%; width: 85%; height: 6.5%;"></div>
            <div onclick="goToDashboard(false)" class="hotspot" style="top: 7%; left: 5%; width: 12%; height: 6%;"></div>
        </div>

        <div id="f3_check" class="screen"><img src="../../assets/images/uc07_check_fee_fl1.png" class="w-full h-full object-cover">
            <div onclick="autoLoad('f3_load', 'f3_dept')" class="hotspot" style="top: 51%; left: 8%; width: 85%; height: 6.5%;"></div>
        </div>
        <div id="f3_load" class="screen"><img src="../../assets/images/uc07_loading_fee_fl1.png" class="w-full h-full object-cover"></div>
        <div id="f3_dept" class="screen"><img src="../../assets/images/uc07_loading_dept_fl3.png" class="w-full h-full object-cover">
            <div onclick="autoLoad('f3_connect', 'f3_success')" class="hotspot" style="top: 70%; left: 8%; width: 85%; height: 6.5%;"></div>
        </div>
        <div id="f3_connect" class="screen"><img src="../../assets/images/uc07_connect_bkpay_fl3.png" class="w-full h-full object-cover"></div>
        <div id="f3_success" class="screen"><img src="../../assets/images/uc07_successful_fl3.png" class="w-full h-full object-cover">
            <div onclick="goToDashboard(true)" class="hotspot" style="top: 81%; left: 5%; width: 91%; height: 6.5%;"></div>
        </div>
    </div>

    <script>
        function show(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function autoLoad(loadId, nextId) {
            show(loadId);
            setTimeout(() => { show(nextId); }, 1000);
        }

        function goToDashboard(isSuccess) {
            if(isSuccess) {
                // Phát tín hiệu hệ thống: SV đã thanh toán
                localStorage.setItem('student_payment', 'success_' + Date.now());
            }
            // Quay về App chính kèm theo tham số URL để App biết tự động đăng nhập lại
            window.location.href = '../common/uc01_login_mobile.html?return=true&success=' + isSuccess;
        }
    </script>
</body>
</html>
